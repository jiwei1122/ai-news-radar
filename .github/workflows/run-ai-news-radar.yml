# 工作流名称，在 GitHub Actions 面板显示
name: Run AI News Radar

# 触发条件：支持手动触发 + 推送到 main 分支时自动触发
on:
  # 手动触发（推荐，方便测试）
  workflow_dispatch:
  # 自动触发：推送到 main 分支时
  push:
    branches: [ main ]

# 作业定义：运行在 Ubuntu 最新版环境
jobs:
  run-news-radar:
    runs-on: ubuntu-latest
    # 设置运行权限（基础权限足够）
    permissions:
      contents: read

    steps:
      # 步骤1：检出仓库代码到运行环境
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：设置 Python 环境（匹配项目所需版本，这里用 3.10，可根据项目调整）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # 缓存依赖，加速后续运行
          cache: 'pip'

      # 步骤3：安装项目依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 步骤4：（可选）配置环境变量（如果项目需要）
      # 如果项目有敏感变量，替换成你在仓库 Secrets 中配置的名称
      - name: Set environment variables
        env:
          # 示例：API_KEY 是你配置的 Secret 名称，值会自动注入
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "API_KEY=$API_KEY" >> $GITHUB_ENV

      # 步骤5：运行项目主脚本（核心步骤，确认项目主入口文件是 main.py）
      - name: Run AI News Radar
        run: |
          python main.py
